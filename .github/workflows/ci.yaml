---
name: CI

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: armv6l
          - arch: aarch64
          - arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0, verified via git ls-remote

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        # v4.2.0, verified via git ls-remote

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        # v4.2.0, verified via git ls-remote

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        # v6.2.0, verified via git ls-remote
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.arch }}
            type=raw,value=${{ matrix.arch }}-${{ github.sha }}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        # v4.4.0, verified via git ls-remote
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rootfs to GHCR
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export
          build-args: |
            ARCH=${{ matrix.arch }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Build and export initramfs
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export-initramfs
          build-args: |
            ARCH=${{ matrix.arch }}
          outputs: type=local,dest=dist
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Upload artifact
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1, verified via git ls-remote
        with:
          name: initramfs-${{ matrix.arch }}
          path: dist/initramfs.cpio.gz

