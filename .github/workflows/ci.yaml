---
name: CI

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      week: ${{ steps.date.outputs.week }}
    steps:
      - name: Get current date
        id: date
        run: echo "week=$(date +'%Y-%U')" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: armv6l
          - arch: aarch64
          - arch: x86_64
    env:
      CACHE_KEY: build-${{ matrix.arch }}-${{ needs.setup.outputs.week }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0, verified via git ls-remote

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        # v4.2.0, verified via git ls-remote

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        # v4.2.0, verified via git ls-remote


      - name: Build and export initramfs
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export-initramfs
          build-args: |
            ARCH=${{ matrix.arch }}
          outputs: type=local,dest=dist
          cache-from: type=gha,scope=${{ env.CACHE_KEY }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_KEY }}

      - name: Upload artifact
        id: upload-initramfs
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1, verified via git ls-remote
        with:
          name: initramfs-${{ matrix.arch }}
          path: dist/initramfs.cpio.gz

      - name: Build and export extra initramfs
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export-initramfs
          build-args: |
            ARCH=${{ matrix.arch }}
            INSTALL_STAGE=install-packages
            INSTALL_PACKAGES=xbps-triggers dropbear pam sudo
            ROOTFS=extrarootfs
          outputs: type=local,dest=dist-extra
          cache-from: type=gha,scope=${{ env.CACHE_KEY }}
          cache-to: ""  # don't write to cache for the extra initramfs

      - name: Upload extra initramfs artifact
        id: upload-extra-initramfs
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1, verified via git ls-remote
        with:
          name: extra-initramfs-${{ matrix.arch }}
          path: dist-extra/initramfs.cpio.gz


  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0, verified via git ls-remote

      - name: install-qemu
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm

      - name: download-initramfs
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        # v8.0.1, verified via git ls-remote
        with:
          name: initramfs-${{matrix.arch}}
          path: "${{github.workspace}}/initramfs"

      - name: download-extra-initramfs
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        # v8.0.1, verified via git ls-remote
        with:
          name: extra-initramfs-${{matrix.arch}}
          path: "${{github.workspace}}/extra-initramfs"

      - name: run
        timeout-minutes: 10
        env:
          PACKAGE: "${{matrix.package}}"
          KERNEL_VERSION: "6.18.28"
          USER: "user"
          PASSWORD: "password"
        run: |
          set -euxo pipefail

          ssh_cmd() {
            sshpass -p "${{env.PASSWORD}}" ssh \
              -o StrictHostKeychecking=no \
              -p 2223 ${{env.USER}}@127.0.0.1 "$@"
          }

          docker create \
            --name rpi-kernel \
            --platform linux/arm64/v8 \
            "ghcr.io/asssaf/rpi-kernel:${{ env.KERNEL_VERSION }}-default" \
            true
          docker cp rpi-kernel:/Image-${{ env.KERNEL_VERSION }} .

          CPU="cortex-a72"
          SMP="2"
          MEM="1G"
          INITRD="initramfs/initramfs.cpio.gz extra-initramfs/initramfs.cpio.gz"
          export CPU SMP MEM INITRD
          scripts/run.sh |& tee qemu.out &

          until ssh_cmd echo hi
          do
            sleep 5
          done
          ssh_cmd sudo poweroff

      - name: upload log on failure
        if: failure()
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1, verified via git ls-remote
        with:
          name: qemu.out
          path: "${{github.workspace}}/qemu.out"


  publish:
    runs-on: ubuntu-latest
    needs: [test, setup]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: armv6l
          - arch: aarch64
          - arch: x86_64
    env:
      CACHE_KEY: build-${{ matrix.arch }}-${{ needs.setup.outputs.week }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0, verified via git ls-remote

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        # v4.2.0, verified via git ls-remote

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        # v4.2.0, verified via git ls-remote

      - name: Docker metadata for rootfs
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        # v6.2.0, verified via git ls-remote
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.arch }}
            type=raw,value=${{ matrix.arch }}-${{ github.sha }}

      - name: Docker metadata for busybox-binpkgs
        id: meta-busybox
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        # v6.2.0, verified via git ls-remote
        with:
          images: ghcr.io/${{ github.repository }}-busybox-binpkgs
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.arch }}
            type=raw,value=${{ matrix.arch }}-${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        # v4.4.0, verified via git ls-remote
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push busybox-binpkgs to GHCR
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export-busybox-binpkgs
          build-args: |
            ARCH=${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta-busybox.outputs.tags }}
          labels: ${{ steps.meta-busybox.outputs.labels }}
          cache-from: type=gha,scope=${{ env.CACHE_KEY }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_KEY }}

      - name: Build and push rootfs to GHCR
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0, verified via git ls-remote
        with:
          context: .
          file: docker/Dockerfile
          target: export
          build-args: |
            ARCH=${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.CACHE_KEY }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_KEY }}
